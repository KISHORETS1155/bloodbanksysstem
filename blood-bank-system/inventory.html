<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-droplet-fill"></i> Blood Bank</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search Blood</a></li>
                    <li class="nav-item"><a class="nav-link" href="donor.html">Register Donor</a></li>
                    <li class="nav-item"><a class="nav-link" href="request.html">Request Blood</a></li>
                    <li class="nav-item"><a class="nav-link active" href="inventory.html">Inventory</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">Admin Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <h2 class="text-danger mb-4"><i class="bi bi-box-seam"></i> Blood Bank Inventory Management</h2>

        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="mb-3 text-secondary border-bottom pb-2">Add Blood Stock</h5>
                    <form id="inventoryForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Blood Bank Name</label>
                            <input type="text" id="invBank" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">City</label>
                            <input type="text" id="invCity" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Blood Group</label>
                            <select id="invGroup" class="form-select" required>
                                <option value="">Select...</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Units Available</label>
                            <input type="number" id="invUnits" class="form-control" min="1" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Contact Number</label>
                            <input type="tel" id="invContact" class="form-control" pattern="[0-9]{10}"
                                title="10 digits required" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100"><i class="bi bi-plus-circle"></i> Add
                            Stock</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="mb-3 text-secondary border-bottom pb-2">Current Inventory</h5>
                    <div class="table-responsive">
                        <table class="table table-hover table-bordered align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Blood Bank</th>
                                    <th>City</th>
                                    <th>Group</th>
                                    <th>Units</th>
                                    <th>Contact</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryBody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content border-0">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title">Update Stock Units</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="hidden" id="editItemId">
                        <div class="mb-3">
                            <label class="form-label fw-bold">New Units Available</label>
                            <input type="number" id="editUnits" class="form-control" min="0" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger" id="saveUpdateBtn">Save Changes</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 Blood Bank Availability System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/inventory.js"></script>
</body>

</html>

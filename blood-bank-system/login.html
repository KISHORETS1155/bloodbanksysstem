<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">
    <!-- Navbar (Simplified for Login) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-droplet-fill"></i> Blood Bank</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search Blood</a></li>
                    <li class="nav-item"><a class="nav-link" href="donor.html">Register Donor</a></li>
                    <li class="nav-item"><a class="nav-link" href="request.html">Request Blood</a></li>
                    <!-- We use JS to show/hide admin links -->
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white text-center py-3">
                        <h4 class="mb-0"><i class="bi bi-shield-lock-fill"></i> Admin Login</h4>
                    </div>
                    <div class="card-body p-4">
                        <div id="loginError" class="alert alert-danger d-none" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i> Invalid username or password.
                        </div>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Username</label>
                                <input type="text" id="username" class="form-control" placeholder="Enter admin username"
                                    required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Password</label>
                                <input type="password" id="password" class="form-control"
                                    placeholder="Enter admin password" required>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 py-2 fw-bold">Login</button>
                        </form>
                        <hr class="my-4">
                        <p class="text-center text-muted small mb-0">For demo purposes: User: <code>admin</code>, Pass:
                            <code>admin123</code></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/login.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Registration - Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-droplet-fill"></i> Blood Bank</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search Blood</a></li>
                    <li class="nav-item"><a class="nav-link active" href="donor.html">Register Donor</a></li>
                    <li class="nav-item"><a class="nav-link" href="request.html">Request Blood</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventory.html">Inventory</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">Admin Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0">
                    <div class="card-header bg-danger text-white text-center py-3 rounded-top">
                        <h3 class="mb-0"><i class="bi bi-person-heart"></i> Donor Registration</h3>
                    </div>
                    <div class="card-body p-4 bg-white shadow-sm rounded-bottom">
                        <div id="donorAlert" class="alert alert-success d-none" role="alert">
                            <i class="bi bi-check-circle-fill"></i> Registration successful! Thank you for volunteering
                            to save lives.
                        </div>
                        <form id="donorForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Full Name</label>
                                    <input type="text" id="donorName" class="form-control" placeholder="John Doe"
                                        required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Age <small class="text-muted">(Must be &ge;
                                            18)</small></label>
                                    <input type="number" id="donorAge" class="form-control" min="18" max="65"
                                        placeholder="25" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Gender</label>
                                    <select id="donorGender" class="form-select" required>
                                        <option value="">Select...</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Blood Group</label>
                                    <select id="donorBloodGroup" class="form-select" required>
                                        <option value="">Select...</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Phone Number</label>
                                    <input type="tel" id="donorPhone" class="form-control" pattern="[0-9]{10}"
                                        title="Must be exactly 10 digits" placeholder="9876543210" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">City</label>
                                    <input type="text" id="donorCity" class="form-control" placeholder="Chennai"
                                        required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Last Donation Date <small
                                            class="text-muted">(Optional)</small></label>
                                    <input type="date" id="donorLastDate" class="form-control">
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-danger btn-lg px-5 w-100"><i
                                            class="bi bi-clipboard2-plus"></i> Register as Donor</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 Blood Bank Availability System. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/donor.js"></script>
</body>

</html>

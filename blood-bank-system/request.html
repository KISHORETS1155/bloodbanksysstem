<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Blood - Blood Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-droplet-fill"></i> Blood Bank</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search Blood</a></li>
                    <li class="nav-item"><a class="nav-link" href="donor.html">Register Donor</a></li>
                    <li class="nav-item"><a class="nav-link active" href="request.html">Request Blood</a></li>
                    <li class="nav-item"><a class="nav-link" href="inventory.html">Inventory</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">Admin Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-dark text-white text-center py-3 rounded-top">
                        <h3 class="mb-0"><i class="bi bi-heart-pulse"></i> Blood Request Form</h3>
                    </div>
                    <div class="card-body p-4 bg-white rounded-bottom">
                        <div id="requestAlert" class="alert alert-success d-none" role="alert">
                            <i class="bi bi-check-circle-fill"></i> Blood request submitted successfully! We will
                            contact you soon.
                        </div>
                        <form id="requestForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Patient Name</label>
                                    <input type="text" id="reqName" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Blood Group Needed</label>
                                    <select id="reqBloodGroup" class="form-select" required>
                                        <option value="">Select...</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Units Required</label>
                                    <input type="number" id="reqUnits" class="form-control" min="1" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Hospital Name</label>
                                    <input type="text" id="reqHospital" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">City</label>
                                    <input type="text" id="reqCity" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Contact Number</label>
                                    <input type="tel" id="reqContact" class="form-control" pattern="[0-9]{10}"
                                        title="10 digit number" required>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">Emergency Level</label>
                                    <select id="reqEmergency" class="form-select" required>
                                        <option value="Normal">Normal</option>
                                        <option value="Urgent">Urgent</option>
                                        <option value="Critical">Critical</option>
                                    </select>
                                </div>
                                <div class="col-12 text-center mt-4">
                                    <button type="submit" class="btn btn-dark btn-lg px-5 w-100"><i
                                            class="bi bi-send-fill"></i> Submit Request</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="mb-0">&copy; 2026 Blood Bank Availability System. All rights reserved.</p>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
